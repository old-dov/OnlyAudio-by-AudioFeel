name: onlyaudio_by_audiofeel
description: OnlyAudio by AudioFeel desktop player
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2
  flutter_media_metadata: ^1.0.0+1
  path: ^1.9.0
  shared_preferences: ^2.3.2
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  media_kit: ^1.2.6
  media_kit_libs_windows_audio: ^1.0.9
  media_kit_libs_macos_audio: ^1.0.9
  media_kit_libs_linux: ^1.0.9
  window_manager: ^0.4.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/bg_default.png
